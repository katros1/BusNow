############################################

# APPLICATION

############################################
spring.application.name=iots-backend
server.port=8081

############################################

# DATABASE (PostgreSQL + PostGIS)

############################################
spring.datasource.url=jdbc:postgresql://localhost:1000/iots_db
spring.datasource.username=iots_user
spring.datasource.password=/iots_pass@1
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP - default)

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=IotsHikariPool

############################################

# JPA / HIBERNATE

############################################
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# PostGIS dialect

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Format SQL (dev only)

spring.jpa.properties.hibernate.format_sql=true

############################################

# LIQUIBASE (SQL MIGRATIONS)

############################################
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

############################################

# SECURITY (KEYCLOAK - OAuth2 Resource Server)

############################################
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:1001/realms/iots-realm

# Optional: if you want to validate audience

# spring.security.oauth2.resourceserver.jwt.audiences=iots-backend

############################################

# ACTUATOR (Monitoring)

############################################
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# Optional: custom base path

management.endpoints.web.base-path=/actuator

############################################

# LOGGING

############################################
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

############################################

# JACKSON (JSON)

############################################
spring.jackson.time-zone=UTC

############################################

# DEV SETTINGS

############################################
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

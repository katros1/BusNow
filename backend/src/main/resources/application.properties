############################################

# APPLICATION

############################################
spring.application.name=iots-backend
server.port=8087

############################################

# DATABASE (PostgreSQL + PostGIS)

############################################
spring.datasource.url=jdbc:postgresql://localhost:1000/iots_db
spring.datasource.username=iots_user
spring.datasource.password=/iots_pass@1
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP - default)

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=IotsHikariPool

############################################

# JPA / HIBERNATE

############################################
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# PostGIS dialect

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Format SQL (dev only)

spring.jpa.properties.hibernate.format_sql=true

############################################

# LIQUIBASE (SQL MIGRATIONS)

############################################
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

############################################

# SECURITY (KEYCLOAK - OAuth2 Resource Server)

############################################
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:1001/realms/iots-client

# Optional: if you want to validate audience

# spring.security.oauth2.resourceserver.jwt.audiences=iots-backend

############################################

# ACTUATOR (Monitoring)

############################################
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# Optional: custom base path

management.endpoints.web.base-path=/actuator

############################################

# LOGGING

############################################
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

############################################

# REDIS (pub/sub for live vehicle tracking)

############################################
spring.data.redis.host=localhost
spring.data.redis.port=6379
tracking.gps.stale-seconds=30

############################################

# JACKSON (JSON)

############################################
spring.jackson.time-zone=UTC

############################################

# OSRM (Open Source Routing Machine)
# Rwanda has extreme elevation changes — Haversine is inaccurate. OSRM follows actual roads.
# Replace with a self-hosted Rwanda extract for production reliability and lower latency.

############################################
osrm.base-url=http://router.project-osrm.org
osrm.timeout-seconds=5

############################################

# DEV SETTINGS

############################################
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

############################################

# PAGINATION (GLOBAL)

############################################
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
